name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore BottleSharp.slnx

      - name: Build
        run: dotnet build BottleSharp.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test BottleSharp.slnx --no-build --configuration Release
